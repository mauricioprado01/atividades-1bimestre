<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Desafio</title>
        <meta charset="utf-8">
    </head>
    <body>
    <form>
        <table border="0">
        <tr>
            <th colspan="4">Informe o Endereço da Entrega</th>
        
        </tr>

        <tr>
            <td>Tipo de Logradouro</td>
            <td>
               <div><select id="Combobox">
                <option value="1">Casa</option>
                <option value="2" selected>Apartamento</option>
                <option value="3" selected>Condomínio</option>
                <option value="4" selected>Zona Rural</option>
              </select></div> 
            </td>
         </tr>

        <tr>
            <td>Logradouro</td>
            <td>   
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Número</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Bairro</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>CEP</td>
            <td>
                <input type="text">
            </td>
        </tr>

        <tr>
            <td>Cidade</td>
            <td>
                <input type="text">
            </td>
        </tr>
        <tr>
            <td>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </td>
        </tr>
    </table>
    </form>
    </body>
</html>
